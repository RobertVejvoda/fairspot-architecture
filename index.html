<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FairSpot Architecture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .app-name img {
      max-width: 180px;
    }

    .markdown-section {
      max-width: 1280px;
    }

    .markdown-section li {
      margin: 0.35rem 0;
    }

    .plantuml-diagram {
      margin: 1rem 0;
    }

    .plantuml-diagram img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .plantuml-diagram details {
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    const plantUmlServer = 'https://www.plantuml.com/plantuml/svg/';

    function plantUmlAppend3Bytes(b1, b2, b3) {
      const c1 = b1 >> 2;
      const c2 = ((b1 & 0x3) << 4) | (b2 >> 4);
      const c3 = ((b2 & 0xF) << 2) | (b3 >> 6);
      const c4 = b3 & 0x3F;

      return plantUmlEncode6Bit(c1 & 0x3F)
        + plantUmlEncode6Bit(c2 & 0x3F)
        + plantUmlEncode6Bit(c3 & 0x3F)
        + plantUmlEncode6Bit(c4 & 0x3F);
    }

    function plantUmlEncode6Bit(value) {
      if (value < 10) {
        return String.fromCharCode(48 + value);
      }

      value -= 10;
      if (value < 26) {
        return String.fromCharCode(65 + value);
      }

      value -= 26;
      if (value < 26) {
        return String.fromCharCode(97 + value);
      }

      value -= 26;
      if (value === 0) {
        return '-';
      }

      if (value === 1) {
        return '_';
      }

      return '?';
    }

    function plantUmlEncode64(data) {
      let encoded = '';

      for (let i = 0; i < data.length; i += 3) {
        if (i + 2 === data.length) {
          encoded += plantUmlAppend3Bytes(data[i], data[i + 1], 0);
        } else if (i + 1 === data.length) {
          encoded += plantUmlAppend3Bytes(data[i], 0, 0);
        } else {
          encoded += plantUmlAppend3Bytes(data[i], data[i + 1], data[i + 2]);
        }
      }

      return encoded;
    }

    function plantUmlEncode(source) {
      const bytes = new TextEncoder().encode(source);
      const compressed = pako.deflateRaw(bytes, { level: 9 });
      return plantUmlEncode64(compressed);
    }

    function renderPlantUml(source) {
      const encoded = plantUmlEncode(source);
      const imageUrl = `${plantUmlServer}${encoded}`;

      return `
        <figure class="plantuml-diagram">
          <img src="${imageUrl}" alt="Rendered PlantUML diagram">
          <details>
            <summary>PlantUML source</summary>
            <pre><code class="lang-plantuml">${escapeHtml(source)}</code></pre>
          </details>
        </figure>
      `;
    }

    const docsBasePath = window.location.pathname.endsWith('/')
      ? window.location.pathname
      : window.location.pathname.replace(/\/[^/]*$/, '/');

    window.$docsify = {
      name: '',
      logo: 'images/brand/fairspot-logo.svg',
      nameLink: `${docsBasePath}#/`,
      repo: 'https://github.com/RobertVejvoda/fairspot-architecture',
      basePath: docsBasePath,
      homepage: 'Home.md',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'plantuml') {
              return renderPlantUml(code);
            }

            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako_deflate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
